name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: pytest -q
      - name: Golden score
        run: semantic-checksum score data/golden.json
      - name: Build and reinstall wheel
        run: |
          python -m build
          python -m pip install --force-reinstall --no-deps dist/*.whl
          semantic-checksum --version
